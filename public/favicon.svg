<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0c0c0c"/>
  <!-- Geometric M mark in amber — two triangles sharing the centre valley -->
  <!-- Left triangle outline (hollow) -->
  <polygon
    points="3,26 10.5,7 16,16 10.5,7"
    fill="none"
    stroke="#b8956a"
    stroke-width="2.2"
    stroke-linejoin="miter"
  />
  <polygon
    points="3,26 10.5,7 10.5,26"
    fill="none"
    stroke="#b8956a"
    stroke-width="2.2"
    stroke-linejoin="miter"
  />
  <!-- Right triangle outline (hollow) -->
  <polygon
    points="29,26 21.5,7 16,16 21.5,7"
    fill="none"
    stroke="#b8956a"
    stroke-width="2.2"
    stroke-linejoin="miter"
  />
  <polygon
    points="29,26 21.5,7 21.5,26"
    fill="none"
    stroke="#b8956a"
    stroke-width="2.2"
    stroke-linejoin="miter"
  />
</svg>